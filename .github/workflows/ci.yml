name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}   # manual trigger — lets the first deploy run from any branch

jobs:
  backend:
    name: Backend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore TeamPrompts.slnx
      - run: dotnet build TeamPrompts.slnx -c Release --no-restore

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build

  # ════════════════════════════════════════════════════════════════════════════
  #  DEPLOY — runs on push to main OR a manual "Run workflow" (workflow_dispatch).
  #  Requires repo secrets DEPLOY_HOST + DEPLOY_SSH_KEY (set via `gh secret set`).
  #  GHCR images are pushed under the repo owner; the deploy job pulls them on the
  #  server with the workflow's GITHUB_TOKEN (packages: read).
  # ════════════════════════════════════════════════════════════════════════════
  docker:
    name: Docker images (build + push to GHCR)
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/src/TeamPrompts.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/skyp1nus/team-prompts/api:latest
            ghcr.io/skyp1nus/team-prompts/api:${{ github.sha }}
      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          # Same origin behind the shared Caddy — empty base URL = relative /api/*.
          # Inlined into the client bundle at build time (a runtime env can't override it).
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=
          tags: |
            ghcr.io/skyp1nus/team-prompts/web:latest
            ghcr.io/skyp1nus/team-prompts/web:${{ github.sha }}

  deploy:
    name: Deploy (scp compose + Caddy snippet, pull, up -d, reload Caddy)
    needs: [docker]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Copy compose + Caddy site block to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/docker-compose.prod.yml,deploy/team-prompts.caddy"
          target: "/opt/team-prompts"
          strip_components: 1
      - name: Pull, restart, install + reload shared Caddy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/team-prompts
            export IMAGE_TAG="${{ github.sha }}"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            install -D -m 644 team-prompts.caddy /opt/shared/sites/team-prompts.caddy
            docker exec shared-caddy-1 caddy reload --config /etc/caddy/Caddyfile
            docker image prune -f
            docker logout ghcr.io
